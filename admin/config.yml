backend:
  name: git-gateway
  branch: main

locale: nl
publish_mode: simple
media_folder: assets/Images/uploads
public_folder: /assets/Images/uploads

collections:
  - name: blog
    label: Blog
    label_singular: Artikel
    folder: blog/posts
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} - {{date}}"
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Publicatiedatum, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Categorie, name: category, widget: select, options: [Loopbaan, Life coaching, Retraite, Ondernemen] }
      - { label: Samenvatting, name: excerpt, widget: text }
      - { label: Uitgelichte afbeelding, name: image, widget: image, required: false }
      - { label: Inhoud, name: body, widget: markdown }

  - name: site_inhoud
    label: Site-inhoud
    files:
      - file: content/site.json
        label: Home en Blog
        name: home_blog
        fields:
          - { label: Home hero - label, name: homeHeroEyebrow, widget: string }
          - { label: Home hero - titel (HTML toegestaan), name: homeHeroTitleHtml, widget: text }
          - { label: Home hero - intro, name: homeHeroIntro, widget: text }
          - { label: Home hero - knop primair tekst, name: homeHeroPrimaryText, widget: string }
          - { label: Home hero - knop primair link, name: homeHeroPrimaryHref, widget: string }
          - { label: Home hero - knop secundair tekst, name: homeHeroSecondaryText, widget: string }
          - { label: Home hero - knop secundair link, name: homeHeroSecondaryHref, widget: string }
          - { label: Home retraite - afbeelding, name: homeRetreatImageSrc, widget: image }
          - { label: Home retraite - alt tekst, name: homeRetreatImageAlt, widget: string }
          - { label: Blog hero - label, name: blogHeroLabel, widget: string }
          - { label: Blog hero - titel, name: blogHeroTitle, widget: string }
          - { label: Blog hero - intro, name: blogHeroIntro, widget: text }
          - { label: Blog nieuwsbrief - titel, name: blogNewsletterTitle, widget: string }
          - { label: Blog nieuwsbrief - tekst, name: blogNewsletterText, widget: text }
